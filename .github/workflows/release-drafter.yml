name: Release Automation

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-automation
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git User Info
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      # Generate changelog (no commit/tag/push — will be opened as a PR).
      # To regenerate CHANGELOG.md from scratch locally run:
      #   npx conventional-changelog-cli -p angular -i CHANGELOG.md -s -r 0
      - name: Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-git-pull: true
          skip-commit: true
          skip-tag: true
          skip-version-file: true
          output-file: CHANGELOG.md
          tag-prefix: ""
          release-count: "0"

      # Open a PR with the updated CHANGELOG.md (respects branch ruleset)
      - name: Create Changelog PR
        if: steps.changelog.outputs.skipped == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update changelog for ${{ steps.changelog.outputs.version }}"
          title: "docs: update changelog for ${{ steps.changelog.outputs.version }}"
          branch: auto/changelog-update
          base: main
          body: |
            Automated changelog update generated by Release Automation workflow.

            **Version**: `${{ steps.changelog.outputs.version }}`
          labels: docs

      # Update release draft
      - name: Update Release Draft
        uses: release-drafter/release-drafter@v7
        id: release_drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Show release information
      - name: Show Release Information
        run: |
          echo "🏷️ Tag Name: ${{ steps.release_drafter.outputs.tag_name }}"
          echo "📝 Release Name: ${{ steps.release_drafter.outputs.name }}"
          echo "🔢 Version: ${{ steps.changelog.outputs.version || 'N/A' }}"
          echo "🆔 Release ID: ${{ steps.release_drafter.outputs.id || 'N/A' }}"

      # Manual release creation (workflow_dispatch)
      - name: Create Release (Manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_drafter.outputs.tag_name }}
          name: ${{ steps.release_drafter.outputs.name }}
          body: ${{ steps.release_drafter.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
