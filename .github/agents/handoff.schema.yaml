version: 1
name: caf_orchestrator_handoff

description: >-
  Internal handoff contract for CAF Orchestrator delegations.
  This payload is not intended for end-user display.

required:
  - task_id
  - phase
  - agent_name
  - objective
  - scope_paths
  - constraints
  - required_skill_workflows
  - acceptance_criteria
  - validation_commands
  - artifacts_expected

fields:
  task_id:
    type: string
    example: CAF-2026-05-28-001

  phase:
    type: string
    enum: [research, implementation, validation, docs, ci]

  agent_name:
    type: string
    enum:
      - Module Builder
      - Module Updater
      - Diagnostics Integrator
      - Private Endpoint Integrator
      - Example Generator
      - Compliance Validator
      - Documentation Sync
      - CI Workflow Manager
      - Migration Assistant
      - Remote State Orchestrator

  objective:
    type: string
    description: One-sentence desired outcome.

  scope_paths:
    type: array
    items: string
    minItems: 1
    description: Explicit repo paths allowed for this delegation.

  constraints:
    type: object
    required: [no_push, no_manual_workarounds, backward_compatibility]
    properties:
      no_push:
        type: boolean
      no_manual_workarounds:
        type: boolean
      backward_compatibility:
        type: boolean
      notes:
        type: string

  required_skill_workflows:
    type: array
    items: string
    description: Skills/procedures that must be invoked when relevant.

  acceptance_criteria:
    type: array
    items: string
    minItems: 1

  validation_commands:
    type: array
    items: string
    description: Commands to run and report in results.

  artifacts_expected:
    type: array
    items: string
    description: File or report outputs expected from delegate.

  non_goals:
    type: array
    items: string
    default: []

  decision_log:
    type: array
    items: string
    description: Short rationale entries when strategy changes.

delegate_return_contract:
  required:
    - summary
    - changed_files
    - validations_run
    - risks
    - next_action
  schema:
    summary: string
    changed_files: array[string]
    validations_run: array[string]
    risks: array[string]
    next_action: string
